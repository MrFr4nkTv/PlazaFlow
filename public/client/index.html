<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PlazaFlow - El Menú</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&amp;family=Nunito:wght@200..900&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Custom CSS -->
<link rel="stylesheet" href="../css/style-client.css">
<!-- Theme Configuration -->
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "plaza-primary": "#FF6B6B",
                        "plaza-bg": "#FFF9F5",
                        "plaza-surface": "#FFFFFF",
                        "plaza-text": "#2D232E",
                        "plaza-muted": "#9CA3AF",
                        "plaza-secondary": "#FFD93D",
                        "plaza-accent": "#6BCB77",
                        "plaza-highlight": "#FEE2E2",
                    },
                    fontFamily: {
                        "heading": ["Fredoka", "sans-serif"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    borderRadius: {
                        "card": "24px",
                        "pill": "9999px",
                    },
                    boxShadow: {
                        "soft": "0 10px 25px -5px rgba(255, 107, 107, 0.15)",
                        "inner-light": "inset 0 2px 4px 0 rgba(255, 255, 255, 0.3)",
                    }
                },
            },
        }
    </script>
<style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        body {
            background-color: #FFF9F5; /* Fallback */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  <script src="../../src/client/app.js" type="module"></script>
  </head>
<body class="min-h-screen flex flex-col items-center bg-gray-50 font-body text-plaza-text antialiased selection:bg-plaza-primary selection:text-white">
<div class="w-full max-w-md mx-auto flex-1 flex flex-col bg-plaza-bg shadow-xl xl:shadow-2xl relative">
<!-- Sticky Header -->
<header class="fixed top-0 inset-x-0 max-w-md mx-auto z-50 bg-plaza-bg/95 backdrop-blur-sm h-16 flex items-center justify-between px-6 shadow-sm border-b border-plaza-primary/5">
<!-- Spacer for center alignment -->
<div class="w-10"></div>
<!-- Logo -->
<div class="flex items-center gap-1">
<h1 class="font-heading font-semibold text-2xl text-plaza-primary tracking-tight">PlazaFlow</h1>
<span class="material-symbols-outlined text-plaza-accent text-[20px] font-bold">eco</span>
</div>
<!-- User Avatar -->
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-white shadow-sm cursor-pointer hover:scale-105 transition-transform">
<img alt="Smiling user avatar portrait" class="w-full h-full object-cover" data-alt="Smiling user avatar portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_C0jvH4S9ge5CAAr1UZ2Yu767rS7eOad92xYrpVDiVKSIX_R3-trXnacBbyScK3yOh8nfWWcvEf2yAi-aG7SApdz-FjUwadO2MrqDQW2xPO_oS_2n-nD5wGhdpzs1u6LVW0Il_rOD5yjQpI35ndvLpHHB43BIgUlyTrqGWldROZ_M1MwGS2lUXOn7Xj6noczoC0G0pqYwxvxY7HrZhTdM8mdJdRVbE64x6FohYEl0VQS77jKLDG0OGIOAh0Z7pGVRPRERA4wvbo8"/>
</div>
</header>
<!-- Main Content Area -->
<main class="pt-20 px-4 max-w-md mx-auto relative">
<!-- Category Navigation -->
<nav class="sticky top-16 z-40 bg-plaza-bg py-2 mb-4 -mx-4 px-4 overflow-x-auto no-scrollbar flex items-center gap-3">
<!-- Active Pill -->
<button class="flex-shrink-0 h-10 px-6 rounded-pill bg-plaza-primary text-white font-heading font-medium text-sm shadow-md shadow-plaza-primary/30 transform active:scale-95 transition-all">
                Todos
            </button>
<!-- Inactive Pills -->
<button class="flex-shrink-0 h-10 px-6 rounded-pill bg-white text-plaza-text font-heading font-medium text-sm shadow-sm border border-transparent hover:border-plaza-highlight active:scale-95 transition-all flex items-center gap-2">
<span>🔥</span> Populares
            </button>
<button class="flex-shrink-0 h-10 px-6 rounded-pill bg-white text-plaza-text font-heading font-medium text-sm shadow-sm border border-transparent hover:border-plaza-highlight active:scale-95 transition-all flex items-center gap-2">
<span>🌮</span> Tacos
            </button>
<button class="flex-shrink-0 h-10 px-6 rounded-pill bg-white text-plaza-text font-heading font-medium text-sm shadow-sm border border-transparent hover:border-plaza-highlight active:scale-95 transition-all flex items-center gap-2">
<span>🥗</span> Extras
            </button>
<button class="flex-shrink-0 h-10 px-6 rounded-pill bg-white text-plaza-text font-heading font-medium text-sm shadow-sm border border-transparent hover:border-plaza-highlight active:scale-95 transition-all flex items-center gap-2">
<span>🥤</span> Bebidas
            </button>
<button class="flex-shrink-0 h-10 px-6 rounded-pill bg-white text-plaza-text font-heading font-medium text-sm shadow-sm border border-transparent hover:border-plaza-highlight active:scale-95 transition-all flex items-center gap-2">
<span>🍰</span> Sabritas
            </button>
</nav>
<!-- Feed List -->
<div class="flex flex-col gap-5 pb-24" id="client-menu-grid">
<!-- Skeleton Loader 1 -->
<article class="bg-white rounded-card p-3 shadow-soft flex items-start gap-4 h-[120px] animate-pulse">
<div class="w-[100px] h-full flex-shrink-0 rounded-[16px] bg-gray-200"></div>
<div class="flex-1 py-1 flex flex-col justify-between h-full pr-10">
<div>
<div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
<div class="h-3 bg-gray-200 rounded w-full mb-1"></div>
<div class="h-3 bg-gray-200 rounded w-5/6"></div>
</div>
<div class="h-5 bg-gray-200 rounded w-1/4 mt-auto"></div>
</div>
</article>
<!-- Skeleton Loader 2 -->
<article class="bg-white rounded-card p-3 shadow-soft flex items-start gap-4 h-[120px] animate-pulse">
<div class="w-[100px] h-full flex-shrink-0 rounded-[16px] bg-gray-200"></div>
<div class="flex-1 py-1 flex flex-col justify-between h-full pr-10">
<div>
<div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
<div class="h-3 bg-gray-200 rounded w-full mb-1"></div>
<div class="h-3 bg-gray-200 rounded w-5/6"></div>
</div>
<div class="h-5 bg-gray-200 rounded w-1/4 mt-auto"></div>
</div>
</article>
<!-- Skeleton Loader 3 -->
<article class="bg-white rounded-card p-3 shadow-soft flex items-start gap-4 h-[120px] animate-pulse">
<div class="w-[100px] h-full flex-shrink-0 rounded-[16px] bg-gray-200"></div>
<div class="flex-1 py-1 flex flex-col justify-between h-full pr-10">
<div>
<div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
<div class="h-3 bg-gray-200 rounded w-full mb-1"></div>
<div class="h-3 bg-gray-200 rounded w-5/6"></div>
</div>
<div class="h-5 bg-gray-200 rounded w-1/4 mt-auto"></div>
</div>
</article>
<div class="text-center w-full py-4 text-plaza-muted font-medium animate-pulse">Cargando Platos...</div>
</div>
</main>
<!-- Sticky Cart Bar -->
<div class="fixed bottom-0 inset-x-0 w-full max-w-md mx-auto z-50 h-20 px-4 pb-4 pointer-events-none flex justify-center">
<!-- The Floating Button Container -->
<button class="pointer-events-auto w-full max-w-md h-[64px] rounded-full bg-gradient-to-r from-plaza-primary to-[#FF8E8E] text-white shadow-xl shadow-plaza-primary/30 flex items-center justify-between px-6 transform transition-transform hover:scale-[1.02] active:scale-[0.98]" id="btn-open-cart">
<div class="flex items-center gap-2">
<div class="bg-white/20 w-8 h-8 rounded-full flex items-center justify-center backdrop-blur-sm">
<span class="font-heading font-bold text-sm" id="cart-item-count">3</span>
</div>
<span class="font-body font-semibold text-lg">Pedidos</span>
</div>
<div class="flex items-center gap-2">
<span class="font-heading font-bold text-xl" id="cart-total-price">$20.00</span>
<span class="material-symbols-outlined text-[24px]">chevron_right</span>
</div>
</button>
</div>
</div>
</body></html>

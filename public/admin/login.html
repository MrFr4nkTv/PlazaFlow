<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PlazaFlow - Acceso Administrador</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&amp;family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF6B6B",      
                        "primary-soft": "#FFF0F0", 
                        "primary-dark": "#E05A5A",
                        "background": "#FFF9F5",   
                        "surface": "#FFFFFF",
                        "ink": "#2D3436",          
                        "ink-light": "#636E72",    
                        "success": "#2ECC71",      
                        "success-light": "#E8F8F5",
                        "warning": "#FF9F43",      
                        "warning-light": "#FFF3E0",
                        "card-border": "#E2E8F0",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    borderRadius: {
                        "lg": "16px",
                        "xl": "24px",
                        "2xl": "32px",
                        "3xl": "40px",
                        "full": "9999px",
                    },
                    boxShadow: {
                        "soft": "0 4px 20px -2px rgba(0, 0, 0, 0.05)",
                        "float": "0 10px 30px -5px rgba(255, 107, 107, 0.2)",
                        "inner-soft": "inset 0 2px 4px 0 rgba(0, 0, 0, 0.02)",
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .safe-bottom {
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center bg-gray-50 text-ink font-body antialiased">
<div class="w-full max-w-7xl mx-auto flex-1 flex flex-col items-center justify-between px-6 py-8 relative overflow-hidden bg-background shadow-xl">
<div class="absolute top-0 left-0 w-full h-80 bg-gradient-to-b from-primary-soft to-transparent z-0 pointer-events-none"></div>
<div class="absolute -top-20 -right-20 w-72 h-72 bg-primary/10 rounded-full blur-3xl pointer-events-none z-0"></div>
<div class="absolute bottom-0 -left-20 w-80 h-80 bg-warning/10 rounded-full blur-3xl pointer-events-none z-0"></div>
<main class="w-full max-w-md mx-auto flex flex-col justify-center flex-grow z-10 gap-8">
<div class="flex flex-col items-center justify-center text-center space-y-6 mt-4">
<div class="w-24 h-24 bg-primary rounded-3xl text-white flex items-center justify-center shadow-float rotate-3 transform transition-transform hover:rotate-0 mb-2">
<span class="material-symbols-outlined text-[48px]">restaurant_menu</span>
</div>
<div class="space-y-2">
<h2 class="font-display font-bold text-3xl text-ink tracking-tight">PlazaFlow</h2>
<p class="text-ink-light text-base font-medium">Portal KDS</p>
</div>
</div>
<div class="bg-surface/80 p-6 rounded-[32px] shadow-soft border border-white/60 backdrop-blur-md w-full">
<form class="space-y-5">
<div class="space-y-2">
<label class="block font-display font-bold text-ink text-sm uppercase tracking-wide ml-1" for="email">E-mail Administrativo</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-ink-light/50 group-focus-within:text-primary transition-colors text-2xl">mail</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-background border-2 border-transparent focus:border-primary focus:ring-0 focus:bg-white rounded-2xl text-lg font-medium text-ink placeholder-ink-light/40 transition-all outline-none shadow-inner-soft h-14" id="email" placeholder="admin@restaurant.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block font-display font-bold text-ink text-sm uppercase tracking-wide" for="password">Contraseña</label>
<a class="text-xs font-bold text-primary hover:text-primary-dark transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-ink-light/50 group-focus-within:text-primary transition-colors text-2xl">lock</span>
</div>
<input class="block w-full pl-12 pr-12 py-4 bg-background border-2 border-transparent focus:border-primary focus:ring-0 focus:bg-white rounded-2xl text-lg font-medium text-ink placeholder-ink-light/40 transition-all outline-none shadow-inner-soft h-14" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-ink-light/50 hover:text-ink transition-colors" type="button">
<span class="material-symbols-outlined text-2xl">visibility</span>
</button>
</div>
</div>
<button class="w-full py-4 bg-primary text-white rounded-2xl font-display font-bold text-lg tracking-wide shadow-float hover:bg-primary-dark active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4 h-14" type="button">
<span>Entrar</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
</div>
<div class="text-center">
<p class="text-ink-light font-medium text-sm">¿Necesitas ayuda? <a class="text-primary font-bold hover:underline" href="#">Contactar Soporte</a></p>
</div>
</main>
<div class="w-full text-center py-4 safe-bottom z-10">
<p class="text-xs font-mono text-ink-light/40">v2.4.0 • PlazaFlow KDS</p>
</div>
</div>

</body></html>

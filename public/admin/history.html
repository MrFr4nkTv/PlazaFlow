<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Plazaflow Historial Unificado</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500;700&amp;family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="stylesheet" href="../css/style-kds.css">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#FF7F7F", 
              "primary-dark": "#E56363",
              "background-light": "#FFF5F2", 
              "surface": "#FFFFFF",
              "ink": "#000000",
              "success": "#00C853",
            },
            fontFamily: {
              "display": ["Space Grotesk", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "mono": ["JetBrains Mono", "monospace"],
            },
            borderRadius: {
              "DEFAULT": "16px",
              "sm": "8px",
              "md": "12px",
              "lg": "20px",
              "xl": "24px",
              "full": "9999px",
            },
            boxShadow: {
                "soft": "0 4px 20px rgba(0,0,0,0.05)",
                "card": "0 2px 8px rgba(0,0,0,0.04)",
                "float": "0 8px 30px rgba(255, 127, 127, 0.15)",
                "nav": "0 -4px 20px rgba(0,0,0,0.03)",
            }
          },
        },
      }
    </script>
<style>
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #FF7F7F; 
            border-radius: 4px;
        }
        body {
            min-height: max(844px, 100dvh);
            background-color: #FFF9F7;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  <script src="../../src/admin/admin.js" type="module"></script>
  </head>
<body class="min-h-screen flex flex-col items-center bg-gray-50 text-ink font-body antialiased">
<div class="w-full max-w-7xl mx-auto flex-1 flex flex-col bg-[#FFF9F7] shadow-xl overflow-hidden relative">
<header class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-100 shadow-sm">
<div class="flex items-center justify-between h-16 px-6 pt-2">
<div class="flex items-center gap-3">
<div class="h-10 w-10 bg-primary rounded-full flex items-center justify-center shrink-0 shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-white text-[20px]">restaurant</span>
</div>
<div class="flex flex-col">
<h1 class="text-lg font-bold tracking-tight text-gray-900 leading-none">Plazaflow</h1>
<span class="text-[11px] font-bold text-gray-400 mt-0.5">Historial</span>
</div>
</div>
<div class="flex items-center gap-2">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-primary text-white hover:bg-primary-dark transition-colors shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-[20px]">print</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 text-gray-400 hover:bg-red-50 hover:text-red-500 transition-colors" id="btn-logout" title="Cerrar sesión">
<span class="material-symbols-outlined text-[20px]">logout</span>
</button>
</div>
</div>
<div class="px-6 py-4 space-y-4">
<div class="flex items-center justify-between bg-gray-50 p-1.5 rounded-2xl border border-gray-100">
<button id="filter-day" class="history-filter-btn flex-1 py-2 text-[11px] font-bold uppercase tracking-wider rounded-xl bg-white text-primary shadow-sm border border-gray-100 transition-all">Día</button>
<button id="filter-week" class="history-filter-btn flex-1 py-2 text-[11px] font-bold uppercase tracking-wider rounded-xl text-gray-400 hover:text-gray-600 transition-all">Semana</button>
<button id="filter-month" class="history-filter-btn flex-1 py-2 text-[11px] font-bold uppercase tracking-wider rounded-xl text-gray-400 hover:text-gray-600 transition-all">Mes</button>
</div>
<div class="flex items-center gap-3 bg-white p-3 rounded-2xl border border-gray-100 shadow-sm">
<div class="flex-1 flex items-center gap-3 px-3 py-2 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer hover:bg-gray-100 transition-colors">
<div class="h-8 w-8 rounded-full bg-white flex items-center justify-center text-primary border border-gray-100 shadow-sm">
<span class="material-symbols-outlined text-[16px]">calendar_today</span>
</div>
<div class="flex flex-col">
<span class="text-[9px] text-gray-400 font-bold uppercase tracking-wide">Desde</span>
<span class="text-sm font-mono font-bold text-gray-800" id="history-date-start">--</span>
</div>
</div>
<span class="material-symbols-outlined text-gray-300 text-[20px]">arrow_forward</span>
<div class="flex-1 flex items-center gap-3 px-3 py-2 bg-gray-50 rounded-xl border border-gray-100 cursor-pointer hover:bg-gray-100 transition-colors">
<div class="h-8 w-8 rounded-full bg-white flex items-center justify-center text-primary border border-gray-100 shadow-sm">
<span class="material-symbols-outlined text-[16px]">event</span>
</div>
<div class="flex flex-col">
<span class="text-[9px] text-gray-400 font-bold uppercase tracking-wide">Hasta</span>
<span class="text-sm font-mono font-bold text-gray-800" id="history-date-end">--</span>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="bg-white rounded-2xl p-4 shadow-card flex flex-col justify-between border border-gray-50 h-[100px]">
<div class="flex justify-between items-start">
<div class="h-8 w-8 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center">
<span class="material-symbols-outlined text-[18px]">receipt_long</span>
</div>
<span class="text-[10px] uppercase text-gray-400 font-bold tracking-wider bg-gray-50 px-2 py-1 rounded-full">Pedidos</span>
</div>
<span class="text-3xl font-bold text-gray-900 font-display mt-auto">142</span>
</div>
<div class="bg-white rounded-2xl p-4 shadow-card flex flex-col justify-between border border-primary/20 ring-1 ring-primary/5 h-[100px] relative overflow-hidden">
<div class="absolute right-0 top-0 h-16 w-16 bg-primary/5 rounded-bl-full -mr-4 -mt-4"></div>
<div class="flex justify-between items-start relative z-10">
<div class="h-8 w-8 rounded-full bg-primary/10 text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[18px]">payments</span>
</div>
<span class="text-[10px] uppercase text-primary font-bold tracking-wider bg-primary/5 px-2 py-1 rounded-full">Ventas</span>
</div>
<span class="text-3xl font-bold text-gray-900 font-display mt-auto relative z-10">$4,285</span>
</div>
</div>
</div>
</header>
<main class="flex-1 overflow-y-auto px-6 pt-2 pb-8 space-y-4">
<div class="flex items-center justify-between py-2 px-1">
<h2 class="font-display font-bold text-lg text-gray-800 flex items-center gap-2" id="history-date-label">
            Hoy
            <span class="h-1.5 w-1.5 rounded-full bg-primary"></span>
</h2>
<div class="flex items-center gap-1 text-[10px] font-bold text-gray-400 bg-white px-3 py-1.5 rounded-full border border-gray-100 shadow-sm">
<span>MÁS RECIENTES</span>
<span class="material-symbols-outlined text-[12px]">sort</span>
</div>
</div>
<div class="space-y-4" id="history-order-list">
<!-- Orders will be dynamically injected here. Replacing with skeleton loaders. -->
<div class="bg-white rounded-[24px] shadow-float overflow-hidden border border-primary/20 animate-pulse">
<div class="p-5 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="bg-gray-200 h-14 w-14 rounded-2xl"></div>
<div class="flex flex-col gap-2 w-full">
<div class="h-4 w-24 bg-gray-200 rounded"></div>
<div class="h-3 w-16 bg-gray-200 rounded"></div>
</div>
</div>
</div>
</div>
<div class="bg-white rounded-[24px] shadow-card border border-gray-100 overflow-hidden animate-pulse">
<div class="p-5 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="bg-gray-200 h-14 w-14 rounded-2xl"></div>
<div class="flex flex-col gap-2 w-full">
<div class="h-4 w-24 bg-gray-200 rounded"></div>
<div class="h-3 w-16 bg-gray-200 rounded"></div>
</div>
</div>
</div>
</div>
</div>
<div class="py-4 flex justify-center">
<button class="bg-white border border-gray-200 text-gray-500 px-6 py-3 rounded-full font-bold text-xs uppercase tracking-wide hover:bg-gray-50 hover:text-gray-800 transition-colors shadow-sm w-full">
            Cargar Turnos Anteriores
        </button>
</div>
</main>
<nav class="fixed bottom-0 left-0 right-0 max-w-7xl mx-auto bg-white border-t border-gray-100 shadow-nav z-50 pb-safe">
<div class="flex items-center justify-between px-10 pt-3 pb-6 h-[88px] max-w-lg mx-auto">
<button class="flex flex-col items-center gap-1 group w-16" id="nav-active-orders">
<div class="h-7 w-12 flex items-center justify-center rounded-2xl bg-transparent text-gray-400 group-hover:text-primary group-hover:bg-primary/5 transition-all">
<span class="material-symbols-outlined text-[24px]">grid_view</span>
</div>
<span class="text-[11px] font-bold text-gray-400 group-hover:text-primary transition-colors">Tablero</span>
</button>
<button class="flex flex-col items-center gap-1 group w-16" id="nav-stock">
<div class="h-7 w-12 flex items-center justify-center rounded-2xl bg-transparent text-gray-400 group-hover:text-primary group-hover:bg-primary/5 transition-all">
<span class="material-symbols-outlined text-[24px]">inventory_2</span>
</div>
<span class="text-[11px] font-bold text-gray-400 group-hover:text-primary transition-colors">Inventario</span>
</button>
<button class="flex flex-col items-center gap-1 group w-16" id="nav-history">
<div class="h-7 w-12 flex items-center justify-center rounded-2xl bg-primary/10 text-primary transition-all">
<span class="material-symbols-outlined text-[24px] filled">history</span>
</div>
<span class="text-[11px] font-bold text-primary">Historial</span>
</button>
</div>
</nav>
</div>
</body></html>

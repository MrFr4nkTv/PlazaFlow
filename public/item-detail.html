<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PlazaFlow - Item Detail Modal</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&amp;family=Nunito:wght@200..1000&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "plaza-coral": "#FF6B6B",
                        "plaza-cream": "#FFF9F5",
                        "plaza-surface": "#FFFFFF",
                        "plaza-text": "#2D232E",
                        "plaza-muted": "#9CA3AF",
                        "plaza-yellow": "#FFD93D",
                        "plaza-green": "#6BCB77",
                        "plaza-highlight": "#FEE2E2",
                    },
                    fontFamily: {
                        "heading": ["Fredoka", "sans-serif"],
                        "body": ["Nunito", "sans-serif"],
                    },
                    borderRadius: {
                        "card": "24px",
                        "pill": "9999px",
                        "modal": "32px",
                    },
                    boxShadow: {
                        "soft": "0 4px 20px rgba(0,0,0,0.04)",
                        "primary": "0 10px 25px -5px rgba(255, 107, 107, 0.25)",
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Custom Radio Styling for "Squishy" feel */
        .squishy-radio:checked {
            background-color: #FF6B6B;
            border-color: #FF6B6B;
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3ccircle cx='8' cy='8' r='3'/%3e%3c/svg%3e");
        }
        
        /* Soft bounce animation for interactions */
        .active-bounce:active {
            transform: scale(0.95);
            transition: transform 0.1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-800 font-body antialiased h-screen w-full overflow-hidden relative flex justify-center items-end sm:items-center">
<!-- Background Context (Simulating the Feed screen behind) -->
<div class="absolute inset-0 w-full h-full bg-[url('https://images.unsplash.com/photo-1555939594-58d7cb561ad1?ixlib=rb-4.0.3&amp;auto=format&amp;fit=crop&amp;w=1000&amp;q=80')] bg-cover bg-center blur-sm brightness-50" data-alt="Blurred background of food court"></div>
<!-- Modal Container -->
<div class="relative w-full max-w-md h-[85vh] bg-plaza-cream rounded-t-modal sm:rounded-modal shadow-2xl flex flex-col overflow-hidden animate-[slideUp_0.4s_ease-out]">
<!-- Drag Handle (Visual affordance) -->
<div class="absolute top-3 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-gray-300/50 rounded-full z-20"></div>
<!-- Scrollable Content Area -->
<div class="flex-1 overflow-y-auto no-scrollbar pb-32 relative">
<!-- Hero Image Section -->
<div class="relative h-[240px] w-full">
<img alt="Spicy Tuna Taco with fresh toppings" class="w-full h-full object-cover rounded-b-[40px]" data-alt="Close up of spicy tuna taco with garnish" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAMG2Lu0U6vzGd2kAFPQEWc_2ygzKZ_Ltwo4xUYwEgcyTseVfQJMt7Lg9f5gPj7tC8l-dPp49HJMifgYomld_1bdKm18Iyb2b0mQgZvTSlHfkM1e3mEojwU1i1z6WNwS00zvU77Ug9htFnADpefQAvEMVrYuYHmWWlr9lmkrzGBFyF2E49x5TMMw2PmL8b5qXqTuCyfMDaLISaohfeIWDWUqevLhjaEYyZxPc3hFneSOohhySptH57BDB9aIhRZDSfRbECPk_uIV9s"/>
<!-- Floating Close Button -->
<button class="absolute top-4 right-4 w-10 h-10 bg-white/90 backdrop-blur rounded-full flex items-center justify-center shadow-soft active-bounce text-plaza-text z-10">
<span class="material-symbols-outlined font-bold text-[20px]">close</span>
</button>
</div>
<!-- Content Body -->
<div class="px-6 pt-6 flex flex-col gap-6">
<!-- Title Block -->
<div class="flex flex-col gap-2">
<div class="flex items-start justify-between">
<h1 class="font-heading font-bold text-2xl text-plaza-text leading-tight w-3/4">Spicy Tuna Taco</h1>
<span class="bg-plaza-yellow/20 text-yellow-700 text-xs font-bold px-3 py-1.5 rounded-full flex items-center gap-1 font-heading whitespace-nowrap">
<span class="material-symbols-outlined text-[14px]">local_fire_department</span>
                            450 kcal
                        </span>
</div>
<p class="text-plaza-muted text-base leading-relaxed">
                        Fresh sashimi-grade tuna, spicy mayo, crispy nori shell, sesame seeds, and micro cilantro.
                    </p>
</div>
<div class="h-px w-full bg-gray-100"></div>
<!-- Modifier Group: Required (Radio) -->
<div class="flex flex-col gap-4">
<div class="flex items-center justify-between">
<h3 class="font-heading font-bold text-lg text-plaza-text">Choice of Sauce</h3>
<span class="text-xs font-bold text-plaza-coral bg-plaza-highlight px-2 py-1 rounded-lg uppercase tracking-wide">Required</span>
</div>
<div class="flex flex-col gap-3">
<!-- Option 1 -->
<label class="group relative flex items-center justify-between p-4 bg-white rounded-2xl border-2 border-transparent hover:border-plaza-highlight has-[:checked]:border-plaza-coral has-[:checked]:bg-plaza-highlight/10 transition-all cursor-pointer shadow-sm">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center text-orange-500">
<span class="material-symbols-outlined">hot_tub</span>
</div>
<span class="font-bold text-plaza-text font-body">Spicy Mayo</span>
</div>
<input checked="" class="w-6 h-6 border-2 border-gray-300 text-plaza-coral focus:ring-plaza-coral focus:ring-offset-0 squishy-radio" name="sauce" type="radio"/>
</label>
<!-- Option 2 -->
<label class="group relative flex items-center justify-between p-4 bg-white rounded-2xl border-2 border-transparent hover:border-plaza-highlight has-[:checked]:border-plaza-coral has-[:checked]:bg-plaza-highlight/10 transition-all cursor-pointer shadow-sm">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-yellow-100 flex items-center justify-center text-yellow-600">
<span class="material-symbols-outlined">water_drop</span>
</div>
<span class="font-bold text-plaza-text font-body">Ponzu Citrus</span>
</div>
<input class="w-6 h-6 border-2 border-gray-300 text-plaza-coral focus:ring-plaza-coral focus:ring-offset-0 squishy-radio" name="sauce" type="radio"/>
</label>
<!-- Option 3 -->
<label class="group relative flex items-center justify-between p-4 bg-white rounded-2xl border-2 border-transparent hover:border-plaza-highlight has-[:checked]:border-plaza-coral has-[:checked]:bg-plaza-highlight/10 transition-all cursor-pointer shadow-sm">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-400">
<span class="material-symbols-outlined">block</span>
</div>
<span class="font-bold text-plaza-text font-body">No Sauce</span>
</div>
<input class="w-6 h-6 border-2 border-gray-300 text-plaza-coral focus:ring-plaza-coral focus:ring-offset-0 squishy-radio" name="sauce" type="radio"/>
</label>
</div>
</div>
<!-- Modifier Group: Optional (Checkbox) -->
<div class="flex flex-col gap-4 pb-8">
<div class="flex items-center justify-between">
<h3 class="font-heading font-bold text-lg text-plaza-text">Add Extras</h3>
<span class="text-xs font-bold text-plaza-muted uppercase tracking-wide">Optional</span>
</div>
<div class="grid grid-cols-1 gap-3">
<!-- Extra 1 -->
<label class="group relative flex items-center justify-between p-4 bg-white rounded-2xl border-2 border-transparent hover:border-plaza-highlight has-[:checked]:border-plaza-coral has-[:checked]:bg-plaza-highlight/10 transition-all cursor-pointer shadow-sm">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center text-green-600">
<span class="material-symbols-outlined">eco</span>
</div>
<div class="flex flex-col">
<span class="font-bold text-plaza-text font-body">Avocado Slice</span>
<span class="text-xs text-plaza-muted font-bold">+$1.50</span>
</div>
</div>
<input class="w-6 h-6 rounded-md border-2 border-gray-300 text-plaza-coral focus:ring-plaza-coral focus:ring-offset-0" type="checkbox"/>
</label>
<!-- Extra 2 -->
<label class="group relative flex items-center justify-between p-4 bg-white rounded-2xl border-2 border-transparent hover:border-plaza-highlight has-[:checked]:border-plaza-coral has-[:checked]:bg-plaza-highlight/10 transition-all cursor-pointer shadow-sm">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-amber-100 flex items-center justify-center text-amber-600">
<span class="material-symbols-outlined">grain</span>
</div>
<div class="flex flex-col">
<span class="font-bold text-plaza-text font-body">Sesame Seeds</span>
<span class="text-xs text-plaza-muted font-bold">+$0.50</span>
</div>
</div>
<input class="w-6 h-6 rounded-md border-2 border-gray-300 text-plaza-coral focus:ring-plaza-coral focus:ring-offset-0" type="checkbox"/>
</label>
</div>
</div>
</div>
</div>
<!-- Sticky Footer Area -->
<div class="absolute bottom-0 left-0 w-full bg-white/80 backdrop-blur-md border-t border-gray-100 p-6 pb-8 z-30 rounded-t-3xl">
<div class="flex items-center justify-between gap-4">
<!-- Stepper Control -->
<div class="flex items-center bg-gray-100 rounded-pill p-1.5 h-[56px] shadow-inner">
<button class="w-12 h-full rounded-full bg-white text-plaza-text flex items-center justify-center shadow-sm active-bounce disabled:opacity-50 disabled:cursor-not-allowed">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="w-10 text-center font-heading font-bold text-xl text-plaza-text">1</span>
<button class="w-12 h-full rounded-full bg-plaza-coral text-white flex items-center justify-center shadow-md shadow-plaza-coral/30 active-bounce">
<span class="material-symbols-outlined">add</span>
</button>
</div>
<!-- Primary CTA -->
<button class="flex-1 h-[56px] bg-plaza-coral hover:bg-red-500 text-white rounded-pill flex items-center justify-between px-6 shadow-primary active-bounce transition-colors">
<span class="font-heading font-bold text-lg">Add to Order</span>
<span class="font-heading font-bold text-lg opacity-90">$12.50</span>
</button>
</div>
</div>
</div>
</body></html>
